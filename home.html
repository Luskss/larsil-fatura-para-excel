<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'" />
  <title>Larsil — Menu Principal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dist/style.css">
  <style>
    body { display: flex; flex-direction: column; }
  </style>
</head>
<body>

<script>
(function(){
  document.querySelectorAll('.nav-dropdown-wrap').forEach(function(w){
    var btn=w.querySelector('.nav-dropdown-btn'),menu=w.querySelector('.nav-dropdown-menu');
    btn.addEventListener('click',function(e){e.stopPropagation();var open=menu.classList.contains('open');document.querySelectorAll('.nav-dropdown-menu').forEach(function(m){m.classList.remove('open');});document.querySelectorAll('.nav-dropdown-btn').forEach(function(b){b.classList.remove('open');});if(!open){menu.classList.add('open');btn.classList.add('open');}});
  });
  document.addEventListener('click',function(){document.querySelectorAll('.nav-dropdown-menu').forEach(function(m){m.classList.remove('open');});document.querySelectorAll('.nav-dropdown-btn').forEach(function(b){b.classList.remove('open');});});
})();
</script>

<main class="flex-1 flex flex-col items-center justify-center px-4 py-12 relative z-10">
  <div class="mb-10 text-center">
    <img src="img/logo-branca.png" alt="Larsil Florestal"
         class="h-[90px] w-auto max-w-full object-contain"
         style="filter:drop-shadow(0 4px 20px rgba(77,181,94,.35))">
  </div>

  <h1 class="text-2xl font-black tracking-wide text-white/90  mb-10 text-center">
    Selecione uma opção:
  </h1>

  <div class="flex flex-wrap gap-3 justify-center max-w-[1000px] w-full">

    <!-- Extrato Bancário -->
    <a href="extrato.html" class="menu-card">
      <span class="flex items-center justify-center text-accent-glow"
            style="filter:drop-shadow(0 2px 8px rgba(77,181,94,.4))">
        <svg xmlns="http://www.w3.org/2000/svg" width="52" height="52" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="5" width="20" height="14" rx="2"/>
          <line x1="2" y1="10" x2="22" y2="10"/>
          <line x1="7" y1="15" x2="7.01" y2="15"/>
          <line x1="11" y1="15" x2="13" y2="15"/>
        </svg>
      </span>
      <span class="text-base font-bold text-center text-white/90 leading-snug">Extrato Bancário</span>
    </a>

    <!-- Fatura -->
    <a href="conversor.html" class="menu-card">
      <span class="flex items-center justify-center text-accent-glow"
            style="filter:drop-shadow(0 2px 8px rgba(77,181,94,.4))">
        <svg xmlns="http://www.w3.org/2000/svg" width="52" height="52" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
      </span>
      <span class="text-base font-bold text-center text-white/90 leading-snug">Fatura</span>
    </a>

    <!-- Nota Fiscal -->
    <a href="nota-fiscal.html" class="menu-card">
      <span class="flex items-center justify-center text-accent-glow"
            style="filter:drop-shadow(0 2px 8px rgba(77,181,94,.4))">
        <svg xmlns="http://www.w3.org/2000/svg" width="52" height="52" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
          <rect x="9" y="3" width="6" height="4" rx="1"/>
          <line x1="9" y1="12" x2="15" y2="12"/>
          <line x1="9" y1="16" x2="13" y2="16"/>
        </svg>
      </span>
      <span class="text-base font-bold text-center text-white/90 leading-snug">Nota Fiscal</span>
    </a>

    <!-- Conferência de Notas -->
    <a href="conferencia-notas.html" class="menu-card">
      <span class="flex items-center justify-center text-accent-glow"
            style="filter:drop-shadow(0 2px 8px rgba(77,181,94,.4))">
        <svg xmlns="http://www.w3.org/2000/svg" width="52" height="52" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 11l3 3L22 4"/>
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
        </svg>
      </span>
      <span class="text-base font-bold text-center text-white/90 leading-snug">Conferência de Notas</span>
    </a>

  </div>
</main>

<footer class="text-center text-[.74rem] pb-6 relative z-10" style="color:rgba(255,255,255,.3)">
  v1.0 &bull; Uso interno
</footer>

<script>
  (function () {
    if (!sessionStorage.getItem('cf_loggedIn')) window.location.replace('index.html');
  })();

  const userName = sessionStorage.getItem('cf_username') || '';
  if (userName) document.getElementById('navUser').textContent = 'Olá, ' + userName;

  document.getElementById('btnLogout').addEventListener('click', async () => {
    try { await fetch('api/logout.php', { method: 'POST' }); } catch (_) {}
    sessionStorage.clear();
    window.location.replace('index.html');
  });
</script>
</body>
</html>
