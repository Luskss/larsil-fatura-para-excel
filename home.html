<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'" />
  <title>Larsil — Menu Principal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:     #2c5529;
      --primary-mid: #3d7a3a;
      --accent:      #4db55e;
      --bg:          #f0f5f0;
      --card:        #ffffff;
      --text:        #1a2e1a;
      --muted:       #6b7b6a;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Montserrat', sans-serif;
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    /* ── NAVBAR ──────────────────────────────────────────────────────────── */
    nav {
      background: linear-gradient(135deg, #1a3318, var(--primary));
      color: #fff;
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 12px rgba(0,0,0,.3);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    nav .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-brand-logo { height: 38px; width: auto; }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    #navUser { font-size: .82rem; opacity: .85; font-weight: 400; }

    #btnLogout {
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.35);
      color: #fff;
      padding: 6px 16px;
      border-radius: 6px;
      font-size: .8rem;
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: .3px;
      transition: background .2s;
    }

    #btnLogout:hover { background: rgba(255,255,255,.28); }

    /* ── MAIN CONTENT ────────────────────────────────────────────────────── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 16px 60px;
    }

    .logo {
      margin-bottom: 10px;
      text-align: center;
    }

    .logo img {
      height: 90px;
      width: auto;
      max-width: 100%;
      object-fit: contain;
    }

    .page-title {
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--text);
      margin-bottom: 36px;
      text-align: center;
      letter-spacing: .3px;
    }

    /* ── CARDS GRID ──────────────────────────────────────────────────────── */
    .cards-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      max-width: 860px;
      width: 100%;
    }

    .menu-card {
      background: var(--card);
      border-radius: 18px;
      width: 230px;
      min-height: 180px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 32px 20px;
      text-decoration: none;
      color: var(--text);
      box-shadow: 0 4px 20px rgba(0,0,0,.08);
      border: 1.5px solid #e4ece4;
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
      cursor: pointer;
    }

    .menu-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 32px rgba(44,85,41,.18);
      border-color: var(--accent);
    }

    .menu-card:active { transform: translateY(-1px); }

    .menu-card .card-icon {
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .menu-card .card-label {
      font-size: 1rem;
      font-weight: 700;
      text-align: center;
      color: var(--text);
      line-height: 1.3;
    }

    /* coming soon badge */
    .menu-card.soon {
      opacity: .65;
      cursor: default;
      pointer-events: none;
    }

    .badge-soon {
      font-size: .65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      background: #e8f4e8;
      color: var(--primary);
      border-radius: 30px;
      padding: 3px 10px;
    }

    /* ── FOOTER ──────────────────────────────────────────────────────────── */
    footer {
      text-align: center;
      font-size: .74rem;
      color: var(--muted);
      padding-bottom: 24px;
    }
  </style>
</head>
<body>

<nav>
  <div class="brand">
    <img src="img/logo-verde.png" alt="Larsil" class="nav-brand-logo"
         onerror="this.src='img/logo-cores.png'">
  </div>
  <div class="nav-right">
    <span id="navUser"></span>
    <button id="btnLogout">Sair</button>
  </div>
</nav>

<main>
  <div class="logo">
    <img src="img/logo-cores.png" alt="Larsil Serviços Florestais" />
  </div>

  <h1 class="page-title">Selecione uma opção:</h1>

  <div class="cards-grid">

    <!-- Extrato Bancário -->
    <a href="extrato.html" class="menu-card">
      <span class="card-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="52" height="52" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="5" width="20" height="14" rx="2"/>
          <line x1="2" y1="10" x2="22" y2="10"/>
          <line x1="7" y1="15" x2="7.01" y2="15"/>
          <line x1="11" y1="15" x2="13" y2="15"/>
        </svg>
      </span>
      <span class="card-label">Extrato Bancário</span>
    </a>

    <!-- Fatura -->
    <a href="conversor.html" class="menu-card">
      <span class="card-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="52" height="52" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
      </span>
      <span class="card-label">Fatura</span>
    </a>

    <!-- Nota Fiscal -->
    <a href="nota-fiscal.html" class="menu-card">
      <span class="card-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="52" height="52" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
          <rect x="9" y="3" width="6" height="4" rx="1"/>
          <line x1="9" y1="12" x2="15" y2="12"/>
          <line x1="9" y1="16" x2="13" y2="16"/>
        </svg>
      </span>
      <span class="card-label">Nota Fiscal</span>
    </a>

  </div>
</main>

<footer>v1.0 &bull; Uso interno</footer>

<script>
  // ── Proteção de rota ─────────────────────────────────────────────────────
  (function () {
    if (!sessionStorage.getItem('cf_loggedIn')) {
      window.location.replace('index.html');
    }
  })();

  // ── Exibe usuário logado ─────────────────────────────────────────────────
  const userName = sessionStorage.getItem('cf_username') || '';
  if (userName) {
    document.getElementById('navUser').textContent = 'Olá, ' + userName;
  }

  // ── Logout ───────────────────────────────────────────────────────────────
  document.getElementById('btnLogout').addEventListener('click', async () => {
    try {
      await fetch('api/logout.php', { method: 'POST' });
    } catch (_) { /* ignora falhas de rede */ }
    sessionStorage.clear();
    window.location.replace('index.html');
  });
</script>
</body>
</html>
