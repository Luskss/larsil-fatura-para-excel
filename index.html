<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'" />
  <title>Larsil — Conversor de Fatura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dist/style.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; overflow: hidden; }
  </style>
</head>
<body>

<div class="login-card">
  <div class="accent-bar"></div>

  <!-- Logo -->
  <div class="text-center mb-8">
    <img src="img/logo-branca.png" alt="Larsil Serviços Florestais"
         class="h-24 w-auto max-w-full object-contain block mx-auto"
         style="filter:drop-shadow(0 4px 16px rgba(77,181,94,.3))">
    <p class="text-xs mt-3 font-normal" style="color:rgba(255,255,255,.55)">
      Conversor de PDF para Excel &mdash; faça login para continuar
    </p>
  </div>

  <form id="loginForm" novalidate>
    <!-- Usuário -->
    <div class="mb-5">
      <label for="username"
             class="block text-[.75rem] font-bold uppercase tracking-[.6px] mb-1.5"
             style="color:rgba(255,255,255,.75)">Usuário</label>
      <input class="login-input" type="text" id="username"
             placeholder="Digite seu usuário" autocomplete="username" />
    </div>

    <!-- Senha -->
    <div class="mb-5">
      <div class="flex justify-between items-center mb-1.5">
        <label for="password"
               class="block text-[.75rem] font-bold uppercase tracking-[.6px]"
               style="color:rgba(255,255,255,.75)">Senha</label>
        <a href="#" tabindex="-1"
           class="text-[.76rem] font-semibold no-underline hover:underline"
           style="color:#4db55e;opacity:.85">Esqueceu a senha?</a>
      </div>
      <div class="relative">
        <input class="login-input pr-11" type="password" id="password"
               placeholder="Digite sua senha" autocomplete="current-password" />
        <button type="button" id="togglePw" aria-label="Mostrar/ocultar senha"
                class="absolute right-3 top-1/2 -translate-y-1/2 bg-transparent border-none cursor-pointer flex p-0"
                style="color:rgba(255,255,255,.4)">
          <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
               viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Lembrar-me -->
    <label class="flex items-center gap-2 text-[.82rem] font-normal cursor-pointer mb-6"
           style="color:rgba(255,255,255,.55)">
      <input type="checkbox" id="remember"
             class="w-4 h-4 cursor-pointer accent-[#4db55e]" /> Lembrar-me
    </label>

    <button type="submit" class="btn-primary">Entrar</button>

    <div id="errorMsg" class="error-box text-center text-[.84rem]">
      Usuário ou senha incorretos. Tente novamente.
    </div>
  </form>

  <div class="text-center text-[.74rem] mt-7 font-normal" style="color:rgba(255,255,255,.3)">
    Versão 1.0 &bull; Uso interno
  </div>
</div>

<script>
  if (sessionStorage.getItem('cf_loggedIn')) {
    window.location.replace('home.html');
  }

  const toggleBtn = document.getElementById('togglePw');
  const pwInput   = document.getElementById('password');
  const eyeIcon   = document.getElementById('eyeIcon');

  const eyeOpenSVG = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  const eyeClosedSVG = `<path d="M17.94 17.94A10.94 10.94 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;

  toggleBtn.addEventListener('click', () => {
    const show = pwInput.type === 'password';
    pwInput.type = show ? 'text' : 'password';
    eyeIcon.innerHTML = show ? eyeClosedSVG : eyeOpenSVG;
    toggleBtn.style.color = show ? 'rgba(255,255,255,.85)' : 'rgba(255,255,255,.4)';
  });

  const usernameInput = document.getElementById('username');
  const rememberCheck = document.getElementById('remember');
  const savedUser     = localStorage.getItem('cf_user');
  if (savedUser) { usernameInput.value = savedUser; rememberCheck.checked = true; }

  document.getElementById('loginForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    const user    = usernameInput.value.trim();
    const pass    = pwInput.value;
    const errorEl = document.getElementById('errorMsg');
    const btnEl   = document.querySelector('.btn-primary');

    if (!user || !pass) {
      errorEl.textContent = 'Preencha usuário e senha.';
      errorEl.style.display = 'block';
      return;
    }

    btnEl.disabled    = true;
    btnEl.textContent = 'Aguarde…';
    errorEl.style.display = 'none';

    try {
      const controller = new AbortController();
      const timeoutId  = setTimeout(() => controller.abort(), 12000);
      const response = await fetch('api/auth.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: user, password: pass }),
        signal: controller.signal,
      });
      clearTimeout(timeoutId);
      const data = await response.json();

      if (data.success) {
        if (rememberCheck.checked) { localStorage.setItem('cf_user', user); }
        else { localStorage.removeItem('cf_user'); }
        sessionStorage.setItem('cf_loggedIn', '1');
        sessionStorage.setItem('cf_username', data.username || user);
        window.location.href = 'home.html';
      } else {
        errorEl.textContent = data.message || 'Usuário ou senha incorretos.';
        errorEl.style.display = 'block';
        pwInput.value = '';
        pwInput.focus();
      }
    } catch (err) {
      errorEl.textContent = err.name === 'AbortError'
        ? 'Tempo esgotado ao conectar ao banco de dados.'
        : 'Não foi possível conectar ao servidor. Verifique se o XAMPP está ativo.';
      errorEl.style.display = 'block';
    } finally {
      btnEl.disabled    = false;
      btnEl.textContent = 'Entrar';
    }
  });
</script>
</body>
</html>
